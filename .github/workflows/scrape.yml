name: CIS Intelligence Pipeline

on:
  schedule:
    - cron: '*/15 * * * *'  # Run every 15 minutes
  workflow_dispatch:  # Allow manual triggering
    inputs:
      debug:
        description: 'Enable debug mode'
        required: false
        default: 'false'

env:
  PYTHON_VERSION: '3.9'
  NODE_VERSION: '16'

jobs:
  scrape-and-analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Cache Python dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create data directory
      run: mkdir -p data logs

    - name: Run stealth scrapers
      id: scraping
      run: |
        echo "🕷️ Starting stealth extraction from 5 data sources..."
        python scrapers/orchestrator.py --stealth --delay 2-7 --rotate-ua
        echo "✅ Scraping completed"
      continue-on-error: true

    - name: Apply NLP sentiment analysis
      if: steps.scraping.outcome == 'success'
      run: |
        echo "🧠 Running VADER and finBERT sentiment analysis..."
        python nlp/sentiment_analyzer.py --model vader,finbert
        echo "✅ Sentiment analysis completed"

    - name: Consensus verification
      if: steps.scraping.outcome == 'success'
      run: |
        echo "⚖️ Running consensus verification engine..."
        python nlp/consensus_engine.py --threshold 0.85 --weights config/weights.json
        echo "✅ Consensus verification completed"

    - name: Generate intelligence report
      if: steps.scraping.outcome == 'success'
      run: |
        echo "📊 Generating intelligence report..."
        python utils/report_generator.py --format json --output data/master_intel.json
        echo "✅ Report generated"

    - name: Trigger Repo B (Command Center)
      if: steps.scraping.outcome == 'success'
      run: |
        echo "🚀 Triggering operational repository..."
        python utils/dispatcher.py \
          --target-owner "${{ secrets.REPO_B_OWNER }}" \
          --target-repo "${{ secrets.REPO_B_NAME }}" \
          --token "${{ secrets.REPO_B_TOKEN }}" \
          --payload-file data/master_intel.json
        echo "✅ Repository dispatch sent"

    - name: Cleanup old logs
      run: |
        find logs -name "*.log" -mtime +7 -delete || true

    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: cis-logs-${{ github.run_number }}
        path: |
          logs/
          data/master_intel.json
        retention-days: 7

    - name: Heartbeat commit (prevent job pausing)
      if: always()
      run: |
        git config --global user.name 'CIS Bot'
        git config --global user.email 'cis-bot@users.noreply.github.com'
        echo "$(date): Heartbeat commit - ${{ github.run_number }}" >> heartbeat.log
        git add heartbeat.log
        git commit -m "🫀 Heartbeat: $(date)" || echo "No changes to commit"
        git push origin main || echo "Push failed, continuing..."

  health-check:
    runs-on: ubuntu-latest
    needs: scrape-and-analyze
    if: always()
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Health check
      run: |
        echo "🏥 Running health diagnostics..."
        python utils/health_check.py --check-all
        echo "✅ Health check completed"