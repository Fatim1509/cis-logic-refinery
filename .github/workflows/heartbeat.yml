name: Heartbeat Maintenance

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Create heartbeat commit
      run: |
        git config --global user.name 'CIS Heartbeat'
        git config --global user.email 'cis-heartbeat@users.noreply.github.com'
        
        # Create or update heartbeat file
        echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC'): System heartbeat - $(uuidgen)" >> .heartbeat
        
        # Keep only last 10 entries
        tail -n 10 .heartbeat > .heartbeat.tmp && mv .heartbeat.tmp .heartbeat
        
        git add .heartbeat
        git commit -m "💓 Daily heartbeat: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" || echo "No changes needed"
        git push origin main || echo "Push failed, but continuing..."

    - name: Cleanup workflow runs
      uses: actions/delete-package-versions@v4
      continue-on-error: true
      with:
        package-name: 'cis-heartbeat'
        package-type: 'container'
        min-versions-to-keep: 5

    - name: Log completion
      run: |
        echo "✅ Heartbeat maintenance completed at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"